<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cast — Prototype</title>
<style>
  :root {
    --bg: #f6f5f1;
    --panel: #ffffff;
    --panel-2: #f1efe9;
    --panel-3: #e8e6dd;
    --line: #d8d6cc;
    --line-2: #b8b5a8;
    --line-3: #807d70;
    --fg: #18181a;
    --fg-2: #44443f;
    --fg-3: #75736a;
    --fg-4: #a3a195;
    --accent: #185fa5;
    --accent-bg: #e6f1fb;
    --ok: #3b6d11;
    --ok-bg: #eaf3de;
    --warn: #94560a;
    --warn-bg: #faeeda;
    --bad: #a02525;
    --bad-bg: #f7e0e0;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    height: 100%;
  }
  body { overflow: hidden; }
  button, input, textarea, select { font: inherit; color: inherit; }
  button { cursor: pointer; background: none; border: none; }
  code, pre, .mono { font-family: var(--mono); }

  /* ============ APP CHROME ============ */
  #app { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px; height: 44px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .brand-mark {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 14px; letter-spacing: -0.01em;
  }
  .brand-mark::before {
    content: ""; display: block; width: 14px; height: 14px;
    background: var(--fg); border-radius: 2px;
  }
  .crumb-sep { color: var(--fg-4); font-size: 12px; }
  .crumb-text { color: var(--fg-3); font-size: 12px; font-family: var(--mono); }
  .topbar-spacer { flex: 1; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    font-family: var(--mono); white-space: nowrap;
    border: 1px solid transparent;
  }
  .b-info { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
  .b-info-soft { background: var(--accent-bg); color: var(--accent); }
  .b-ok { background: var(--ok-bg); color: var(--ok); }
  .b-ok-strong { background: var(--ok); color: white; }
  .b-warn { background: var(--warn-bg); color: var(--warn); }
  .b-warn-strong { background: var(--warn); color: white; }
  .b-bad { background: var(--bad-bg); color: var(--bad); }
  .b-bad-strong { background: var(--bad); color: white; }
  .b-mute { background: var(--panel-2); color: var(--fg-3); }
  .b-mute-strong { background: var(--fg-2); color: white; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--r-md);
    border: 1px solid var(--line-2);
    background: var(--panel); color: var(--fg);
    font-size: 12px; font-family: var(--mono);
    transition: background 0.1s;
  }
  .btn:hover { background: var(--panel-2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: #134d87; }
  .btn-ghost { border-color: transparent; }
  .btn-ghost:hover { background: var(--panel-2); }
  .btn-sm { padding: 4px 8px; font-size: 11px; }

  /* ============ STAGE LAYOUTS ============ */
  .stage { flex: 1; min-height: 0; overflow: hidden; }

  /* LINEAR: one big screen at a time */
  .stage-linear { display: flex; flex-direction: column; }
  .stage-linear .screen { flex: 1; min-height: 0; overflow: auto; }
  .stage-stepper {
    display: flex; align-items: center; gap: 0;
    padding: 8px 16px; background: var(--panel-2);
    border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px;
    flex-shrink: 0;
  }
  .step {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 4px;
    color: var(--fg-3); cursor: pointer;
  }
  .step.active { color: var(--fg); background: var(--panel); border: 1px solid var(--line); }
  .step.done { color: var(--ok); }
  .step.disabled { opacity: 0.45; pointer-events: none; }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--panel-3); color: var(--fg-3);
    font-size: 9px; font-weight: 600;
  }
  .step.active .step-num { background: var(--accent); color: white; }
  .step.done .step-num { background: var(--ok); color: white; }
  .step-arrow { color: var(--line-2); margin: 0 2px; }

  /* SPLIT: brief left, run/grid right */
  .stage-split {
    display: grid;
    grid-template-columns: minmax(380px, 36%) 1fr;
    height: 100%;
  }
  .stage-split .screen-left {
    border-right: 1px solid var(--line);
    overflow: auto;
    background: var(--panel);
  }
  .stage-split .screen-right { overflow: auto; }

  /* STACKED: everything scrolls in one column */
  .stage-stacked { overflow: auto; padding: 24px; }
  .stage-stacked .stack-card {
    max-width: 1100px; margin: 0 auto 16px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--r-lg); overflow: hidden;
  }
  .stack-card-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--panel-2);
    border-bottom: 1px solid var(--line);
    font-size: 12px; font-family: var(--mono); color: var(--fg-2);
    cursor: pointer;
  }
  .stack-card-head .step-id { color: var(--accent); font-weight: 600; }
  .stack-card-head .chev {
    margin-left: auto; transition: transform 0.15s;
    color: var(--fg-3); font-size: 14px;
  }
  .stack-card.collapsed .chev { transform: rotate(-90deg); }
  .stack-card.collapsed .stack-card-body { display: none; }
  .stack-card-body { padding: 16px; }

  /* ============ S1 BRIEF EDITOR ============ */
  .s1 { display: grid; grid-template-columns: 260px 1fr; gap: 0; min-height: 100%; }
  .s1-sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 16px;
    overflow-y: auto;
  }
  .s1-main { padding: 20px 24px; overflow-y: auto; }
  .stage-split .s1 { grid-template-columns: 1fr; }
  .stage-split .s1-sidebar { border-right: none; border-bottom: 1px solid var(--line); }
  .stage-stacked .s1 { display: block; }
  .stage-stacked .s1-sidebar {
    border-right: none; border-bottom: 1px solid var(--line);
    background: var(--panel-2);
  }
  .stage-stacked .s1-main { padding: 16px; }

  .section-h {
    font-size: 10px; font-weight: 600;
    color: var(--fg-3); text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .section-spacer { height: 18px; }

  .brand-list { display: flex; flex-direction: column; gap: 6px; }
  .brand-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--r-md);
    border: 1px solid var(--line);
    background: var(--panel);
    cursor: pointer; transition: all 0.1s;
  }
  .brand-card:hover { background: var(--panel-2); }
  .brand-card.active {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .brand-swatches {
    display: flex; gap: 0; flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden;
  }
  .brand-swatches > div { width: 12px; height: 22px; }
  .brand-card .name { font-size: 13px; font-weight: 500; }
  .brand-card .sub { font-size: 11px; color: var(--fg-3); }
  .brand-card .check { margin-left: auto; color: var(--accent); font-size: 14px; opacity: 0; }
  .brand-card.active .check { opacity: 1; }

  .field { margin-bottom: 12px; }
  .field-label {
    display: block;
    font-size: 11px; color: var(--fg-3);
    margin-bottom: 4px; font-family: var(--mono);
  }
  .field-input {
    display: block; width: 100%;
    padding: 7px 10px;
    background: var(--panel); border: 1px solid var(--line-2);
    border-radius: var(--r-sm);
    font-size: 13px; font-family: var(--mono);
  }
  .field-input:focus { outline: none; border-color: var(--accent); background: white; }
  textarea.field-input { font-size: 12px; line-height: 1.5; resize: vertical; min-height: 100px; }

  .ratio-pills { display: flex; gap: 6px; }
  .ratio-pill {
    padding: 4px 10px; border: 1px solid var(--line-2);
    border-radius: 999px; font-size: 11px; font-family: var(--mono);
    color: var(--fg-3); background: var(--panel); cursor: pointer;
  }
  .ratio-pill.on { background: var(--accent); color: white; border-color: var(--accent); }

  .market-chips { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px; background: var(--panel); border: 1px solid var(--line-2); border-radius: var(--r-sm); }
  .market-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; background: var(--panel-2);
    border-radius: 4px; font-size: 11px; font-family: var(--mono);
  }
  .market-chip button { color: var(--fg-3); padding: 0 0 0 2px; font-size: 12px; }
  .market-chip button:hover { color: var(--bad); }
  .market-input { border: none; outline: none; background: transparent; font-family: var(--mono); font-size: 11px; padding: 3px 6px; flex: 1; min-width: 80px; }

  .product-row {
    display: grid;
    grid-template-columns: 1fr 110px;
    gap: 10px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    margin-bottom: 8px;
    background: var(--panel);
  }
  .product-row .name { font-size: 13px; font-weight: 500; }
  .product-row .sku { font-size: 11px; color: var(--fg-3); font-family: var(--mono); }
  .product-row .slug { font-size: 10px; color: var(--fg-4); font-family: var(--mono); margin-top: 2px; }
  .dropzone {
    border: 1px dashed var(--line-2); border-radius: var(--r-sm);
    padding: 8px 6px; text-align: center;
    font-size: 10px; color: var(--fg-3);
    background: var(--panel-2);
    cursor: pointer; transition: all 0.1s;
  }
  .dropzone:hover { border-color: var(--accent); color: var(--accent); }
  .dropzone.has-file {
    border-style: solid; border-color: var(--ok);
    background: var(--ok-bg); color: var(--ok);
    font-family: var(--mono); font-size: 10px;
  }
  .dropzone.has-file::before { content: "✓ "; }

  .detected-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: var(--r-sm);
    font-size: 11px; font-family: var(--mono);
    margin-bottom: 4px;
  }
  .detected-row.found { background: var(--ok-bg); color: var(--ok); }
  .detected-row.missing { background: var(--warn-bg); color: var(--warn); }
  .detected-row .ico {
    width: 14px; height: 14px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 2px; font-size: 9px;
  }
  .detected-row.found .ico { background: var(--ok); color: white; }
  .detected-row.missing .ico { background: var(--warn); color: white; }

  .logo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .logo-opt {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border: 1px solid var(--line);
    border-radius: var(--r-sm); cursor: pointer;
    font-size: 11px;
  }
  .logo-opt.on { border-color: var(--accent); background: var(--accent-bg); }
  .logo-opt .swatch {
    width: 26px; height: 26px; flex-shrink: 0;
    border-radius: 3px;
    background-image:
      linear-gradient(45deg, #ddd 25%, transparent 25%),
      linear-gradient(-45deg, #ddd 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ddd 75%),
      linear-gradient(-45deg, transparent 75%, #ddd 75%);
    background-size: 6px 6px;
    background-position: 0 0, 0 3px, 3px -3px, -3px 0;
    background-color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: white;
  }

  .prompt-preview {
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: var(--r-sm); padding: 10px;
    font-family: var(--mono); font-size: 11px; line-height: 1.55;
    color: var(--fg-2);
  }
  .prompt-preview .label { color: var(--fg-3); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }

  .json-editor {
    background: #1c1c1e;
    color: #d4d4d4;
    border-radius: var(--r-md);
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px; line-height: 1.55;
    white-space: pre;
    overflow: auto;
    border: 1px solid #333;
  }
  .json-editor .k { color: #7dd3fc; }
  .json-editor .s { color: #bef264; }
  .json-editor .n { color: #fbbf24; }
  .json-editor .p { color: #d4d4d4; }
  .json-editor .c { color: #71717a; }

  .summary-strip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--panel-2);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px; color: var(--fg-2);
  }
  .summary-strip .grow { flex: 1; }
  .summary-strip .calc { color: var(--fg-3); }
  .summary-strip .calc strong { color: var(--fg); font-weight: 600; }

  /* ============ S2 RUN VIEW ============ */
  .s2 { padding: 20px 24px; max-width: 1000px; margin: 0 auto; }
  .stage-stacked .s2 { padding: 16px; max-width: none; }
  .run-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .run-header h2 { font-size: 16px; font-weight: 600; }
  .run-header .meta { color: var(--fg-3); font-family: var(--mono); font-size: 11px; }

  .progress-bar-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .progress-bar {
    flex: 1; height: 4px; background: var(--panel-3);
    border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 4px; transition: width 0.3s;
  }
  .progress-fill.done { background: var(--ok); }
  .progress-text { font-family: var(--mono); font-size: 11px; color: var(--fg-3); }

  .log {
    background: #1c1c1e;
    color: #d4d4d4;
    border-radius: var(--r-md);
    padding: 14px 16px;
    font-family: var(--mono); font-size: 12px; line-height: 1.7;
    max-height: 480px; overflow-y: auto;
    border: 1px solid #333;
  }
  .log-line {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 1px 0;
    animation: slideIn 0.18s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-4px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .log-time { color: #71717a; font-size: 10px; flex-shrink: 0; min-width: 56px; }
  .log-tag {
    flex-shrink: 0; min-width: 80px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .log-msg { flex: 1; min-width: 0; word-wrap: break-word; }
  .log-line.step .log-tag { color: #71717a; }
  .log-line.asset .log-tag { color: #fbbf24; }
  .log-line.creative .log-tag { color: #7dd3fc; }
  .log-line.compliance.ok .log-tag { color: #84cc16; }
  .log-line.compliance.warn .log-tag { color: #f59e0b; }
  .log-line.compliance.fail .log-tag { color: #ef4444; }
  .log-line.error .log-tag { color: #ef4444; }
  .log-line.error .log-msg { color: #fca5a5; }
  .log-line.complete .log-tag { color: #4ade80; }
  .log-line.complete .log-msg { color: #4ade80; font-weight: 600; }

  .log-cursor {
    display: inline-block; width: 7px; height: 12px;
    background: #d4d4d4; vertical-align: -1px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .run-actions {
    display: flex; gap: 8px; margin-top: 14px;
    justify-content: flex-end;
  }

  /* Failed banner */
  .fail-banner {
    background: var(--bad-bg);
    border: 1px solid var(--bad);
    border-radius: var(--r-md);
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .fail-banner .ico {
    width: 18px; height: 18px; flex-shrink: 0;
    background: var(--bad); color: white;
    border-radius: 2px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .fail-banner h3 { font-size: 13px; color: var(--bad); margin-bottom: 2px; }
  .fail-banner p { font-size: 12px; color: var(--fg-2); font-family: var(--mono); }
  .fail-banner .actions { margin-left: auto; display: flex; gap: 6px; }

  /* ============ S3 OUTPUT GRID ============ */
  .s3 { padding: 20px 24px; }
  .stage-stacked .s3 { padding: 16px; }
  .s3-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .s3-header h2 { font-size: 16px; font-weight: 600; }
  .s3-header .grow { flex: 1; }

  .summary-cards {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 10px 12px;
  }
  .summary-card .label { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--mono); margin-bottom: 4px; }
  .summary-card .num { font-size: 22px; font-weight: 600; line-height: 1; }
  .summary-card.requested .num { color: var(--fg); }
  .summary-card.succeeded .num { color: var(--ok); }
  .summary-card.flagged .num { color: var(--warn); }
  .summary-card.failed .num { color: var(--bad); }
  .summary-card.generated .num { color: var(--accent); }

  .market-tabs-row {
    display: flex; gap: 4px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .market-tab {
    padding: 8px 14px;
    font-size: 12px; font-family: var(--mono);
    color: var(--fg-3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
  }
  .market-tab.active { color: var(--fg); border-bottom-color: var(--accent); }
  .market-tab .count { color: var(--fg-4); margin-left: 4px; }

  .product-row-grid { margin-bottom: 22px; }
  .product-row-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .product-row-head .name { font-size: 14px; font-weight: 500; }
  .product-row-head .source { font-size: 11px; color: var(--fg-3); font-family: var(--mono); margin-left: auto; }

  .ratio-grid {
    display: grid;
    grid-template-columns: 1fr 0.6fr 1.4fr;
    gap: 12px;
  }
  .ratio-tile {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--r-md); overflow: hidden;
    cursor: pointer; transition: all 0.12s;
  }
  .ratio-tile:hover { border-color: var(--line-3); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .ratio-tile.failed { border-color: var(--bad); border-style: dashed; }
  .ratio-tile.warn { border-color: var(--warn); }

  .creative {
    aspect-ratio: 1 / 1;
    background: var(--panel-3);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    padding: 12px; gap: 6px;
    position: relative;
    overflow: hidden;
  }
  .creative-9-16 { aspect-ratio: 9 / 16; }
  .creative-16-9 { aspect-ratio: 16 / 9; }
  .creative.failed {
    background: repeating-linear-gradient(45deg, var(--bad-bg), var(--bad-bg) 8px, var(--panel-2) 8px, var(--panel-2) 16px);
    color: var(--bad);
  }
  .creative.failed .stage-label {
    background: var(--bad); color: white;
    font-family: var(--mono); font-size: 10px;
    padding: 3px 8px; border-radius: 3px;
  }
  .creative.failed .stage-msg {
    font-family: var(--mono); font-size: 10px;
    color: var(--bad); text-align: center;
    margin-top: 6px;
  }

  .creative .product-name {
    font-weight: 600; font-size: 14px;
    text-align: center; line-height: 1.2;
  }
  .creative .message {
    font-size: 11px; text-align: center;
    line-height: 1.3; opacity: 0.85;
    max-width: 90%;
  }
  .creative .corner-logo {
    position: absolute;
    bottom: 8px; right: 8px;
    width: 22px; height: 22px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700;
    background: rgba(255,255,255,0.92);
    color: inherit;
  }
  .creative-16-9 .product-name { font-size: 13px; }
  .creative-16-9 .message { font-size: 10px; }
  .creative-9-16 .corner-logo { width: 20px; height: 20px; }

  .ratio-foot {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: var(--panel-2);
    border-top: 1px solid var(--line);
    font-family: var(--mono); font-size: 10px;
    color: var(--fg-3);
  }
  .ratio-foot .ratio-name { font-weight: 600; color: var(--fg-2); }
  .ratio-foot .grow { flex: 1; }

  .reveal-strip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    margin-top: 16px;
    font-family: var(--mono); font-size: 11px;
  }
  .reveal-strip .path {
    flex: 1; color: var(--fg-3);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    user-select: all;
  }

  /* ============ S4 MODAL ============ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,20,18,0.55);
    backdrop-filter: blur(2px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: fadeIn 0.15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--panel);
    border-radius: var(--r-lg);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    max-width: 760px; width: 100%;
    max-height: 90vh; overflow: auto;
    display: grid;
    grid-template-columns: 320px 1fr;
  }
  .modal-preview {
    background: var(--panel-3);
    padding: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-preview .creative {
    width: 100%; aspect-ratio: 1 / 1;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: var(--r-sm);
  }
  .modal-body {
    padding: 22px 24px;
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .modal-head {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 12px;
  }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-coords { font-family: var(--mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
  .modal-close {
    width: 24px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px;
    color: var(--fg-3); font-size: 16px;
  }
  .modal-close:hover { background: var(--panel-2); color: var(--fg); }

  .check-list { display: flex; flex-direction: column; gap: 6px; }
  .check-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: var(--panel-2);
    border-radius: var(--r-sm);
    font-size: 12px;
  }
  .check-row .ico {
    width: 16px; height: 16px;
    border-radius: 2px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; color: white;
    flex-shrink: 0;
  }
  .check-row.ok .ico { background: var(--ok); }
  .check-row.warn .ico { background: var(--warn); }
  .check-row.fail .ico { background: var(--bad); }
  .check-row .label { flex: 1; color: var(--fg-2); }
  .check-row .detail { font-family: var(--mono); font-size: 10px; color: var(--fg-3); }

  .stage-detail {
    background: var(--bad-bg);
    border: 1px solid var(--bad);
    border-radius: var(--r-md);
    padding: 12px;
  }
  .stage-detail .stage-name {
    font-family: var(--mono); font-size: 10px;
    color: var(--bad); text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .stage-detail .stage-message {
    font-size: 12px; color: var(--fg-2); font-family: var(--mono);
    line-height: 1.5;
  }
  .pipeline-stages {
    display: flex; align-items: center; gap: 0;
    padding: 12px 0;
    overflow-x: auto;
  }
  .pipe-stage {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10px;
    color: var(--fg-4);
    padding: 4px 8px;
    flex-shrink: 0;
  }
  .pipe-stage.ok { color: var(--ok); }
  .pipe-stage.fail { color: var(--bad); font-weight: 600; }
  .pipe-stage .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pipe-arrow { color: var(--line-2); font-size: 10px; padding: 0 2px; flex-shrink: 0; }

  /* ============ EMPTY STATE ============ */
  .empty {
    padding: 40px 20px; text-align: center;
    color: var(--fg-3); font-family: var(--mono); font-size: 12px;
  }

  /* tighter scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb, .json-editor::-webkit-scrollbar-thumb { background: #4a4a4f; }
</style>
</head>
